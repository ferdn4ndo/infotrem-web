name: "Continuous Integration (CI)"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ci:
    name: "CI Pipeline"
    runs-on: "${{ matrix.os }}"

    strategy:
      matrix:
        os: [ "ubuntu-latest" ]
        node: [ "26.x" ]

    steps:
      - name: "Checkout 🛎"
        uses: "actions/checkout@v7"

      - name: "Setup node env 🏗"
        uses: "actions/setup-node@v6"
        with:
          node-version: "${{ matrix.node }}"
          check-latest: true
          cache: "yarn"

      - name: "Install dependencies 👨🏻‍💻"
        run: "yarn --frozen-lockfile"

      - name: "Run linter 👀"
        run: "yarn lint"

      - name: "Run tests 🧪"
        run: "yarn test"
